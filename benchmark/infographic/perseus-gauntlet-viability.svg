<text x="62" y="748" class="section">Product Takeaway</text>
<text x="74" y="770" class="label">Perseus looks viable when positioned as a context runtime: fast enough to sit in front of assistants, resilient enough for messy workspaces, and measurable enough to catch regressions.</text>
