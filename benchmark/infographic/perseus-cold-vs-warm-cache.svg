<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
svg { max-width: 900px; width: 100%; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="coldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ed573"/>
      <stop offset="100%" stop-color="#7bed9f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">Perseus v1.0.2 — Cold vs Warm Render Performance</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="13">@cache ttl=300 · 20ms per query · single-file artifact</text>

  <!-- Grid -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="440"/>
    <line x1="80" y1="440" x2="860" y2="440"/>
    <!-- Horizontal grid lines -->
    <line x1="80" y1="380" x2="860" y2="380" stroke-dasharray="4,4"/>
    <line x1="80" y1="320" x2="860" y2="320" stroke-dasharray="4,4"/>
    <line x1="80" y1="260" x2="860" y2="260" stroke-dasharray="4,4"/>
    <line x1="80" y1="200" x2="860" y2="200" stroke-dasharray="4,4"/>
    <line x1="80" y1="140" x2="860" y2="140" stroke-dasharray="4,4"/>
    <line x1="80" y1="80" x2="860" y2="80" stroke-dasharray="4,4"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="#8b949e" font-size="11" text-anchor="end">
    <text x="70" y="90">225s</text>
    <text x="70" y="150">150s</text>
    <text x="70" y="210">75s</text>
    <text x="70" y="270">0s</text>
  </g>

  <!-- X-axis labels -->
  <g fill="#8b949e" font-size="11" text-anchor="middle">
    <text x="160" y="458">100</text>
    <text x="280" y="458">500</text>
    <text x="400" y="458">1,000</text>
    <text x="520" y="458">5,000</text>
    <text x="640" y="458">10,000</text>
  </g>

  <!-- Cold line (linear, dramatic slope) -->
  <!-- Data: 100=2.5s, 500=11.5s, 1000=22.7s, 5000=112.7s, 10000=225.3s -->
  <!-- Y mapping: 270 = 0s, 80 = 240s. 1s = 0.79px from baseline -->
  <!-- 100→y=268, 500→y=261, 1000→y=252, 5000→y=181, 10000→y=92 -->
  <polyline points="160,268 280,261 400,252 520,181 640,92"
            fill="none" stroke="url(#coldGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Cold dots -->
  <g fill="#ff6b6b">
    <circle cx="160" cy="268" r="5"/><circle cx="280" cy="261" r="5"/>
    <circle cx="400" cy="252" r="5"/><circle cx="520" cy="181" r="5"/>
    <circle cx="640" cy="92" r="5"/>
  </g>

  <!-- Cold labels -->
  <g fill="#ff6b6b" font-size="11" font-weight="600">
    <text x="160" y="245" text-anchor="middle">2.5s</text>
    <text x="280" y="238" text-anchor="middle">11.5s</text>
    <text x="400" y="230" text-anchor="middle">22.7s</text>
    <text x="520" y="158" text-anchor="middle">112.7s</text>
    <text x="640" y="70" text-anchor="middle">225.3s</text>
  </g>

  <!-- Warm line (nearly flat) -->
  <!-- Data: 100=0.285, 500=0.29, 1000=0.295, 5000=0.389, 10000=0.698 -->
  <!-- Y: 100→y=269.8, 500→y=269.8, 1000→y=269.8, 5000→y=269.7, 10000→y=269.4 -->
  <polyline points="160,269.8 280,269.8 400,269.8 520,269.7 640,269.4"
            fill="none" stroke="url(#warmGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Warm dots -->
  <g fill="#2ed573">
    <circle cx="160" cy="270" r="5"/><circle cx="280" cy="270" r="5"/>
    <circle cx="400" cy="270" r="5"/><circle cx="520" cy="270" r="5"/>
    <circle cx="640" cy="270" r="5"/>
  </g>

  <!-- Warm labels (cluster near baseline) -->
  <g fill="#2ed573" font-size="10" font-weight="600">
    <text x="155" y="285">0.29s</text>
    <text x="275" y="285">0.29s</text>
    <text x="395" y="285">0.30s</text>
    <text x="515" y="285">0.39s</text>
    <text x="635" y="285">0.70s</text>
  </g>

  <!-- Speedup annotations -->
  <g fill="#f0c040" font-size="12" font-weight="700" text-anchor="middle">
    <text x="160" y="310">9×</text>
    <text x="280" y="310">40×</text>
    <text x="400" y="310">77×</text>
    <text x="520" y="310">290×</text>
    <text x="640" y="310">323×</text>
  </g>

  <!-- Legend -->
  <g transform="translate(700, 360)">
    <rect x="0" y="0" width="140" height="75" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <line x1="15" y1="15" x2="50" y2="15" stroke="#ff6b6b" stroke-width="3"/>
    <circle cx="32" cy="15" r="4" fill="#ff6b6b"/>
    <text x="60" y="17" fill="#e6edf3" font-size="12">Cold (no cache)</text>
    <line x1="15" y1="40" x2="50" y2="40" stroke="#2ed573" stroke-width="3"/>
    <circle cx="32" cy="40" r="4" fill="#2ed573"/>
    <text x="60" y="42" fill="#e6edf3" font-size="12">Warm (@cache)</text>
    <text x="15" y="63" fill="#f0c040" font-size="11" font-weight="700">Speedup factor</text>
  </g>

  <!-- Subtitle annotations -->
  <text x="450" y="430" text-anchor="middle" fill="#8b949e" font-size="11">
    Cold: ~22.5ms per query, linear with directive count · Warm: &lt;1s regardless of scale · Cache eliminates subprocess cost entirely
  </text>
  <text x="450" y="448" text-anchor="middle" fill="#8b949e" font-size="10">
    Perseus never crashed. Scale ceiling tested to 1,000,000 directives (31 MB file, 22.0s render).
  </text>
</svg>
</body>
</html>
