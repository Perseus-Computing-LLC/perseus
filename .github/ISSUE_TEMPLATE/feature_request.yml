name: Feature Request
description: Propose an idea or feature request for Perseus
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thank you for proposing a new feature! Please fill out the form below to help us understand the use case and implementation details.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? A clear and concise description of what the problem is.
      placeholder: E.g., I'm frustrated when I try to do X because...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen and how it should work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, link references, or design details about the feature request.
