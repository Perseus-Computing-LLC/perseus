name: Bug Report
description: File a bug report to help us improve Perseus
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug! Please fill out the form below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: E.g., Perseus throws an exception when parsing a specific directive...
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Run `perseus render <file.md>`
        2. Define the following directive: `@query ...`
        3. See error output
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: environment_os
    attributes:
      label: Operating System (OS)
      description: E.g., Windows 11, macOS Sequoia, Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: environment_python
    attributes:
      label: Python Version
      description: E.g., 3.10.12, 3.11.4
    validations:
      required: true
  - type: input
    id: environment_perseus
    attributes:
      label: Perseus Version
      description: E.g., v1.0.1 (or output of `python perseus.py --version`)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Command Output
      description: Copy-paste any relevant console output or stack traces here.
      render: shell
