name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io.
# Runs after a GitHub Release, or on demand. Auth is GitHub OIDC (no token):
# the workflow's identity proves ownership of the io.github.Perseus-Computing-LLC
# namespace. PyPI package ownership is proven by the "mcp-name" marker in README.md
# (the perseus-ctx long description).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PyPI to serve this version
        # The release event triggers this workflow and publish.yml (PyPI)
        # concurrently; the registry validates the package against PyPI and
        # loses that race (observed on v1.0.15: "PyPI package 'perseus-ctx'
        # not found (status: 404)"). Poll until the version in VERSION is
        # live on PyPI before publishing, up to ~10 minutes.
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          echo "waiting for perseus-ctx==$ver on PyPI"
          for i in $(seq 1 60); do
            if curl -fsS "https://pypi.org/pypi/perseus-ctx/$ver/json" > /dev/null 2>&1; then
              echo "perseus-ctx $ver is live on PyPI"
              exit 0
            fi
            sleep 10
          done
          echo "::error::perseus-ctx $ver never appeared on PyPI after 10 minutes — check the 'Publish to PyPI' workflow, then re-run this one."
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" \
            | tar -xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
