name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest coverage hypothesis

      - name: Rebuild and verify build artifact
        run: |
          python scripts/build.py
          echo "Artifact rebuilt. Checking if commit needed..."
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add perseus.py
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-rebuild perseus.py [skip ci]"
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
              else
                git push
              fi
              echo "Pushed rebuilt artifact."
            else
              echo "Artifact was already in sync — no commit needed."
            fi
          fi

      - name: Run test suite with coverage
        run: |
          export PERSEUS_ALLOW_DANGEROUS=1
          coverage run -m pytest tests/ -q
          coverage report
