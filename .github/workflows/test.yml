name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml coverage
          pip install pytest pytest-cov

      - name: Run test suite with coverage
        run: |
          coverage run --source=. -m pytest tests/ -q
          coverage report --include="perseus.py" --show-missing
          coverage report --include="perseus.py" --fail-under=70

      - name: Verify build artifact consistency
        run: |
          python scripts/build.py
          git diff --exit-code perseus.py || (echo "perseus.py is out of sync with src/ — run scripts/build.py" && exit 1)
