name: Security Audit

# SECURITY.md commits Perseus to monitoring its dependencies for known CVEs.
# This workflow makes that claim true for the Python side (the Rust side is
# covered by perseus-vault's cargo-audit). It scans the *shipped runtime*
# surface against the PyPI Advisory Database / OSV via pip-audit on every push
# and PR, and weekly to catch advisories published against pinned versions.
#
# Note: only the runtime surface (requirements-runtime.txt) is scanned here. The
# full dev/CI freeze (requirements.txt) is currently internally inconsistent —
# hermes-agent 0.17.0 pins an openai version that conflicts with the pinned
# openai==2.43.0, so pip cannot resolve the set and no tool can audit it as-is.
# That freeze conflict is tracked separately; dev-dependency scanning returns
# once it is consistent. The runtime surface is what users install, so gating on
# it is what protects them.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * 1"   # weekly (Mon 07:00 UTC)

permissions:
  contents: read

jobs:
  # The shipped surface. perseus.py imports only PyYAML at runtime, so this is
  # the set an end user actually installs. A vulnerability here gates the build:
  # we do not ship a runtime with a known CVE.
  runtime-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit runtime dependencies (gating)
        run: pip-audit -r requirements-runtime.txt --strict
